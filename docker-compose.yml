services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: yala_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  yala-api:
    build: .
    env_file:
      - .env
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DATABASE_URL: jdbc:postgresql://postgres:5432/yala_db
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: ${JWT_SECRET}
      CCI_ENCRYPTION_KEY: ${CCI_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8081}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PUBLIC_URL_BASE: ${AWS_S3_PUBLIC_URL_BASE:-}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-resend}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
