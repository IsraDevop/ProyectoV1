<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Welcome to Yala!</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 40px; }
        .header { background: #6C3B9F; color: white; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .content { padding: 20px 0; color: #333; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Welcome to Yala!</h1>
    </div>
    <div class="content">
        <p>Hello, <strong th:text="${name}">User</strong>!</p>
        <p>Welcome to Yala, your marketplace for collectibles — Pokémon TCG, Funko Pops, Comics, and more.</p>
        <p>Your account is ready. Start exploring amazing collectibles today!</p>
    </div>
    <div class="footer">
        <p>&copy; 2026 Yala. All rights reserved.</p>
    </div>
</div>
</body>
</html>
