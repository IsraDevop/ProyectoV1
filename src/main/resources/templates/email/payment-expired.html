<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Payment Deadline Passed</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 40px; }
        .header { background: #E74C3C; color: white; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Payment Deadline Passed</h1>
    </div>
    <p>Hello, <strong th:text="${name}">User</strong>!</p>
    <p>Your payment deadline has passed and your order has been cancelled.</p>
    <p>This incident has been recorded on your account.</p>
    <div class="footer">
        <p>&copy; 2026 Yala. All rights reserved.</p>
    </div>
</div>
</body>
</html>
